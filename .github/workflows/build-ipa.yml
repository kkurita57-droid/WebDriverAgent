name: Build WDA IPA
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build IPA
        run: |
          xcodebuild build \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -sdk iphoneos \
            -configuration Debug \
            -derivedDataPath DerivedData \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            ONLY_ACTIVE_ARCH=NO

          APP=$(find DerivedData/Build/Products -name "*.app" | grep -v ".xctest" | head -1)
          echo "使用するアプリ: $APP"
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -r WDA.ipa Payload/

      - uses: actions/upload-artifact@v4
        with:
          name: WDA-IPA
          path: WDA.ipa
